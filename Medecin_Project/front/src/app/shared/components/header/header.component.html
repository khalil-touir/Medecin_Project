<header class="header">
  <div class="header__left">
    <button class="menu-toggle hide-desktop" (click)="onMenuToggle()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <div class="page-info">
      <h2 class="page-info__title">{{ pageTitle }}</h2>
      <span class="page-info__date">{{ currentDate }}</span>
    </div>
  </div>

  <div class="header__right">
    <!-- Notification bell -->
    <button class="header-action">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="header-action__dot"></span>
    </button>

    <!-- User avatar -->
    <div class="header-user">
      <div class="header-user__avatar">{{ userInitials }}</div>
      <div class="header-user__info hide-mobile">
        <span class="header-user__name">{{ userEmail }}</span>
        <span class="header-user__role">{{ auth.getRole() }}</span>
      </div>
      <button class="header-user__logout" (click)="logout()" title="Logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </div>
</header>
